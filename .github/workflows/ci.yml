name: CI

# Builds the Docker image and runs the test suite on every push / PR.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build benchmark

      - name: Run tests
        run: docker compose run --rm benchmark pytest -v

      # results/results.csv is committed, so the full plotting path can be exercised
      # as a cheap regression guard without re-running the benchmark.
      - name: Generate figures from committed results
        run: docker compose run --rm plots
