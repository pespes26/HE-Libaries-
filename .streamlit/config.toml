# Bar's Design Signature — dark mode (technical/developer tool default).
# Warm-neutral, teal-tinted palette; fonts + pills + mono details are added via injected
# CSS in app/streamlit_app.py (Streamlit's built-in theme cannot set custom fonts).
[theme]
base = "dark"
primaryColor = "#00857F"            # accent (teal)
backgroundColor = "#0C1412"         # page background
secondaryBackgroundColor = "#131E1C" # surface 1 (cards, sidebar, widgets)
textColor = "#e8e2da"               # text primary
font = "sans serif"

[browser]
gatherUsageStats = false
