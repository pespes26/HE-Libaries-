# Bar's Design Signature — light mode (warm sand).
# Warm-neutral palette with teal accent; fonts + pills + mono details + motion are added
# via injected CSS in app/streamlit_app.py (Streamlit's built-in theme cannot set fonts).
[theme]
base = "light"
primaryColor = "#00A19B"            # accent (teal)
backgroundColor = "#E4DDD3"         # page background (warm sand)
secondaryBackgroundColor = "#F0EBE3" # surface 1 (cards, sidebar, widgets)
textColor = "#1a1814"               # text primary
font = "sans serif"

[browser]
gatherUsageStats = false
